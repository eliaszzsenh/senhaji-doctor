openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Dr. Senhaji Jalil Dental Clinic API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: appointments
    description: Appointment management
  - name: contact
    description: Contact form
  - name: chat
    description: Chatbot
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /appointments:
    get:
      operationId: getAppointments
      tags: [appointments]
      summary: Get all appointments
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of appointments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Appointment"
    post:
      operationId: createAppointment
      tags: [appointments]
      summary: Create a new appointment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAppointmentInput"
      responses:
        "201":
          description: Appointment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /appointments/{id}:
    get:
      operationId: getAppointmentById
      tags: [appointments]
      summary: Get appointment by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      operationId: updateAppointment
      tags: [appointments]
      summary: Update an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAppointmentInput"
      responses:
        "200":
          description: Updated appointment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Appointment"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAppointment
      tags: [appointments]
      summary: Cancel/delete an appointment
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Appointment deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /contact:
    post:
      operationId: createContactMessage
      tags: [contact]
      summary: Submit contact form
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactMessageInput"
      responses:
        "201":
          description: Message saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Send a message to the chatbot
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatMessageInput"
      responses:
        "200":
          description: Bot reply
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatReply"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Appointment:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        preferred_date:
          type: string
        preferred_time:
          type: string
        notes:
          type: string
          nullable: true
        status:
          type: string
        lang:
          type: string
          enum: [fr, en, ar, darija]
        created_at:
          type: string
      required:
        - id
        - name
        - email
        - phone
        - service
        - preferred_date
        - preferred_time
        - status
        - created_at

    CreateAppointmentInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        service:
          type: string
        preferred_date:
          type: string
        preferred_time:
          type: string
        notes:
          type: string
          nullable: true
        lang:
          type: string
          enum: [fr, en, ar, darija]
      required:
        - name
        - email
        - phone
        - service
        - preferred_date
        - preferred_time

    UpdateAppointmentInput:
      type: object
      properties:
        preferred_date:
          type: string
        preferred_time:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true

    CreateContactMessageInput:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        message:
          type: string
      required:
        - name
        - email
        - message

    ChatMessageInput:
      type: object
      properties:
        message:
          type: string
        sessionId:
          type: string
        lang:
          type: string
          enum: [fr, en, ar, darija]
      required:
        - message
        - sessionId

    ChatReply:
      type: object
      properties:
        reply:
          type: string
        action:
          type: string
          nullable: true
        quickReplies:
          type: array
          items:
            type: string
          nullable: true
      required:
        - reply

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error
